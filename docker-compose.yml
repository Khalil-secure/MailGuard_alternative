services:
  vault:
    image: hashicorp/vault:latest
    container_name: mailguard-vault
    ports:
      - "8200:8200"
    user: "0:0"
    environment:
      VAULT_LOCAL_CONFIG: '{"storage": {"file": {"path": "/vault/data"}}, "listener": [{"tcp": {"address": "0.0.0.0:8200", "tls_disable": 1}}], "ui": true, "disable_mlock": true, "default_lease_ttl": "168h", "max_lease_ttl": "720h"}'
    command: server -config=/vault/config/local.json
    volumes:
      - vault-data:/vault/data
    cap_add:
      - IPC_LOCK
    networks:
      - mailguard-net
    healthcheck:
      disable: true

  postgres:
    image: postgres:15
    container_name: mailguard-postgres
    environment:
      POSTGRES_DB: mailguard
      POSTGRES_USER: mailguard
      POSTGRES_PASSWORD: mailguard123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - mailguard-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailguard -d mailguard"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  gateway:
      build: ./services/gateway
      ports:
        - "3000:3000"
      env_file:
        - .env
      depends_on:
        vault:
          condition: service_started
        phishing-detector:
          condition: service_healthy
        postgres:
          condition: service_healthy
      networks:
        - mailguard-net
      healthcheck:
        test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/health"]
        interval: 30s
        timeout: 10s
        retries: 3
        start_period: 15s
      restart: unless-stopped

  ai-service:
    build: ./services/ai-service
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      vault:
        condition: service_healthy
    networks:
      - mailguard-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  phishing-detector:
    build: ./services/phishing-detector
    ports:
      - "1025:1025"
      - "8001:8001"
    env_file:
      - .env
    environment:
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=${VAULT_TOKEN}
    depends_on:
      vault:
        condition: service_healthy
    networks:
      - mailguard-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: mailguard-prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    ports:
      - "9090:9090"
    networks:
      - mailguard-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: mailguard-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-mailguard123}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3001:3000"
    networks:
      - mailguard-net
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: mailguard-loki
    user: root
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - mailguard-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: mailguard-promtail
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/log:/var/log
    command: -config.file=/etc/promtail/config.yml
    networks:
      - mailguard-net
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9080/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

networks:
  mailguard-net:
    driver: bridge

volumes:
  vault-data:
  postgres-data:
  prometheus-data:
  grafana-data:
  loki-data: